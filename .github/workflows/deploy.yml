name: Deploy slides

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege by default; the deploy job below grants itself the
# pages/id-token scopes it needs. The build job only reads the repo.
permissions:
  contents: read

# Only one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Marp shells out to Chrome for PDF export; the GitHub runner is
      # non-root but Chrome's sandbox is unhappy here, so disable it.
      CHROME_NO_SANDBOX: "true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          cache: true

      - name: Install Chromium (for Marp PDF export)
        id: chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2
        with:
          chrome-version: stable

      - name: Point Marp at Chromium
        run: echo "CHROME_PATH=${{ steps.chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"

      - name: Build all decks (HTML + PDF)
        run: pixi run build

      - name: Generate index.html
        run: pixi run index

      - name: Assemble site (index.html + presentation folders)
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html _site/
          for d in */ ; do
            case "$d" in
              reference/|theme/|scripts/|node_modules/|_site/|.github/) continue ;;
            esac
            if [ -f "${d}slides.md" ]; then
              echo "publishing ${d}"
              mkdir -p "_site/${d}"
              cp -r "${d}." "_site/${d}"
            fi
          done

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Only the deploy job needs to publish Pages and mint the OIDC token.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
